<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片格式转换器 | 本地处理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        // 统一为蓝绿清爽色系
                        primary: '#0ea5e9',    // 天蓝色
                        secondary: '#10b981',  // 祖母绿
                        success: '#059669',
                        danger: '#ef4444',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    backdropBlur: {
                        xs: '2px',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass {
                background: rgba(255, 255, 255, 0.7);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.3);
            }
            .dark .glass {
                background: rgba(30, 41, 59, 0.7);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .animate-float {
                animation: float 6s ease-in-out infinite;
            }
            @keyframes float {
                0% { transform: translateY(0px); }
                50% { transform: translateY(-10px); }
                100% { transform: translateY(0px); }
            }
            .animate-pulse-slow {
                animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            }
        }
    </style>
</head>
<!-- 清爽蓝绿系背景 -->
<body class="min-h-screen bg-gradient-to-br from-sky-50 via-emerald-50 to-white dark:from-slate-900 dark:via-slate-800 dark:to-slate-900 transition-colors duration-500">
    <!-- 背景装饰 -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-sky-300 dark:bg-sky-600 rounded-full mix-blend-multiply dark:mix-blend-soft-light filter blur-3xl opacity-30 animate-float"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-emerald-300 dark:bg-emerald-600 rounded-full mix-blend-multiply dark:mix-blend-soft-light filter blur-3xl opacity-30 animate-float" style="animation-delay: 2s;"></div>
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-teal-300 dark:bg-teal-600 rounded-full mix-blend-multiply dark:mix-blend-soft-light filter blur-3xl opacity-20 animate-float" style="animation-delay: 4s;"></div>
    </div>

    <div class="relative container mx-auto px-4 py-8 max-w-6xl">
        <!-- 头部：标题完全居中 -->
        <header class="text-center mb-12">
            <!-- 核心修改：标题居中，主题按钮右上角绝对定位 -->
            <div class="relative flex justify-center items-center mb-6">
                <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-sky-500 to-emerald-500 bg-clip-text text-transparent">
                    图片格式转换器
                </h1>
                <button id="themeToggle" class="absolute right-0 p-3 rounded-full glass shadow-lg hover:shadow-xl transition-all duration-300">
                    <span id="themeIcon" class="text-2xl">🌙</span>
                </button>
            </div>
            <p class="text-lg text-gray-600 dark:text-gray-300 max-w-2xl mx-auto">
                所有转换均在您的浏览器本地完成 文件不会上传到服务器 保护您的隐私安全
            </p>
        </header>

        <!-- 上传区域：色系与大背景统一 -->
        <div id="dropzone" class="glass rounded-3xl p-12 text-center mb-8 shadow-xl hover:shadow-2xl transition-all duration-300 cursor-pointer group">
            <div class="text-7xl mb-6 animate-pulse-slow group-hover:scale-110 transition-transform duration-300">📤</div>
            <h3 class="text-2xl font-semibold mb-3 text-gray-800 dark:text-white">拖拽图片到这里</h3>
            <p class="text-gray-600 dark:text-gray-300 mb-4">或点击任意位置选择文件</p>
            <!-- 核心修改：支持格式标签颜色与蓝绿系统一 -->
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-sky-100 dark:bg-sky-900/30 text-sky-600 dark:text-sky-400 text-sm font-medium">
                <span>支持格式：</span>
                <span class="font-bold">PNG, JPG, WebP, BMP, GIF, HEIC</span>
            </div>
            <input type="file" id="fileInput" multiple accept="image/*,.heic" class="hidden">
        </div>

        <!-- 转换设置 -->
        <div id="settingsPanel" class="glass rounded-3xl p-8 mb-8 shadow-xl transition-all duration-500 opacity-0 translate-y-4" style="display: none;">
            <h3 class="text-2xl font-semibold mb-6 text-gray-800 dark:text-white">⚙️ 转换设置</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">目标格式</label>
                    <select id="format" class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-slate-800/50 border border-gray-200 dark:border-gray-700 focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                        <option value="jpeg">JPG - 高质量通用格式</option>
                        <option value="png">PNG - 无损透明背景</option>
                        <option value="webp">WebP - 最小体积推荐</option>
                        <option value="bmp">BMP - 无压缩原始格式</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">
                        输出质量: <span id="qualityValue" class="font-bold text-primary">100%</span>
                    </label>
                    <input type="range" id="quality" min="10" max="100" value="100" 
                           class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-lg appearance-none cursor-pointer accent-primary">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">
                        缩放比例: <span id="scaleValue" class="font-bold text-primary">100%</span>
                    </label>
                    <input type="range" id="scale" min="10" max="100" value="100" 
                           class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-lg appearance-none cursor-pointer accent-primary">
                </div>
            </div>
            <div class="mt-8 flex flex-wrap gap-4">
                <button id="convertBtn" class="px-8 py-4 bg-gradient-to-r from-primary to-secondary text-white rounded-xl font-semibold shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-300">
                    🚀 开始转换
                </button>
                <button id="downloadAllBtn" class="px-8 py-4 bg-success text-white rounded-xl font-semibold shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    📦 下载全部 (ZIP)
                </button>
                <button id="clearBtn" class="px-8 py-4 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-xl font-semibold shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-300">
                    🗑️ 清空所有
                </button>
            </div>
        </div>

        <!-- 转换进度 -->
        <div id="progressPanel" class="glass rounded-3xl p-8 mb-8 shadow-xl transition-all duration-500 opacity-0 translate-y-4" style="display: none;">
            <h3 class="text-2xl font-semibold mb-6 text-gray-800 dark:text-white">⏳ 转换进度</h3>
            <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-6 mb-4 overflow-hidden">
                <div id="progressBar" class="bg-gradient-to-r from-primary to-secondary h-6 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p id="progressText" class="text-gray-600 dark:text-gray-300 text-center font-medium">准备转换...</p>
        </div>

        <!-- 文件列表 -->
        <div id="fileList" class="space-y-4 mb-8"></div>

        <!-- 页脚 -->
        <footer class="text-center text-gray-500 dark:text-gray-400 mt-16 py-8 glass rounded-2xl">
            <p class="text-lg">© 2026 勿安 | 图片格式转换器</p>
        </footer>
    </div>

    <script>
        // 主题切换
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        // 检查系统主题
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
            themeIcon.textContent = '☀️';
        }
        
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            themeIcon.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
        });

        // 全局变量
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const formatSelect = document.getElementById('format');
        const qualitySlider = document.getElementById('quality');
        const qualityValue = document.getElementById('qualityValue');
        const scaleSlider = document.getElementById('scale');
        const scaleValue = document.getElementById('scaleValue');
        const convertBtn = document.getElementById('convertBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const clearBtn = document.getElementById('clearBtn');
        const fileList = document.getElementById('fileList');
        const settingsPanel = document.getElementById('settingsPanel');
        const progressPanel = document.getElementById('progressPanel');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        
        let files = [];
        let convertedFiles = [];

        // 滑块值更新
        qualitySlider.addEventListener('input', () => {
            qualityValue.textContent = qualitySlider.value + '%';
        });
        
        scaleSlider.addEventListener('input', () => {
            scaleValue.textContent = scaleSlider.value + '%';
        });

        // 拖拽事件
        dropzone.addEventListener('click', () => fileInput.click());
        
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('ring-4', 'ring-primary', 'ring-opacity-50');
        });
        
        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('ring-4', 'ring-primary', 'ring-opacity-50');
        });
        
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('ring-4', 'ring-primary', 'ring-opacity-50');
            handleFiles(e.dataTransfer.files);
        });
        
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        // 处理文件
        function handleFiles(fileList) {
            const newFiles = Array.from(fileList).filter(file => {
                const validTypes = ['image/png', 'image/jpeg', 'image/webp', 'image/bmp', 'image/gif', 'image/heic'];
                return validTypes.includes(file.type) || file.name.toLowerCase().endsWith('.heic');
            });
            
            if (newFiles.length === 0) {
                alert('请选择有效的图片文件');
                return;
            }
            
            files = [...files, ...newFiles];
            updateFileList();
            
            // 显示设置面板
            settingsPanel.style.display = 'block';
            setTimeout(() => {
                settingsPanel.classList.remove('opacity-0', 'translate-y-4');
            }, 10);
        }

        // 更新文件列表
        function updateFileList() {
            fileList.innerHTML = '';
            
            files.forEach((file, index) => {
                const fileSize = (file.size / 1024 / 1024).toFixed(2);
                const fileItem = document.createElement('div');
                fileItem.className = 'glass rounded-2xl p-6 shadow-lg flex items-center justify-between transition-all duration-300 hover:shadow-xl';
                fileItem.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-16 h-16 rounded-xl bg-gray-100 dark:bg-gray-800 flex items-center justify-center overflow-hidden">
                            <img src="${URL.createObjectURL(file)}" alt="${file.name}" class="w-full h-full object-cover">
                        </div>
                        <div>
                            <h4 class="font-semibold text-lg text-gray-800 dark:text-white">${file.name}</h4>
                            <p class="text-gray-500 dark:text-gray-400">${fileSize} MB</p>
                        </div>
                    </div>
                    <button class="delete-btn text-danger hover:text-red-600 p-3 rounded-full hover:bg-red-100 dark:hover:bg-red-900/30 transition-all" data-index="${index}">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                `;
                fileList.appendChild(fileItem);
            });

            // 删除按钮事件
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const index = parseInt(e.currentTarget.dataset.index);
                    files.splice(index, 1);
                    updateFileList();
                    if (files.length === 0) {
                        settingsPanel.classList.add('opacity-0', 'translate-y-4');
                        setTimeout(() => {
                            settingsPanel.style.display = 'none';
                        }, 500);
                    }
                });
            });
        }

        // 清空按钮
        clearBtn.addEventListener('click', () => {
            files = [];
            convertedFiles = [];
            fileList.innerHTML = '';
            settingsPanel.classList.add('opacity-0', 'translate-y-4');
            setTimeout(() => {
                settingsPanel.style.display = 'none';
            }, 500);
            progressPanel.classList.add('opacity-0', 'translate-y-4');
            setTimeout(() => {
                progressPanel.style.display = 'none';
            }, 500);
            downloadAllBtn.disabled = true;
        });

        // 转换图片
        convertBtn.addEventListener('click', async () => {
            if (files.length === 0) return;
            
            convertedFiles = [];
            progressPanel.style.display = 'block';
            setTimeout(() => {
                progressPanel.classList.remove('opacity-0', 'translate-y-4');
            }, 10);
            progressBar.style.width = '0%';
            progressText.textContent = '准备转换...';
            convertBtn.disabled = true;
            
            const format = formatSelect.value;
            const quality = qualitySlider.value / 100;
            const scale = scaleSlider.value / 100;
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                progressText.textContent = `正在转换: ${file.name} (${i+1}/${files.length})`;
                progressBar.style.width = `${((i) / files.length) * 100}%`;
                
                try {
                    let imgBlob = file;
                    
                    // 处理HEIC格式
                    if (file.name.toLowerCase().endsWith('.heic')) {
                        progressText.textContent = `正在解码HEIC: ${file.name} (${i+1}/${files.length})`;
                        imgBlob = await heic2any({ blob: file, toType: 'image/jpeg' });
                    }
                    
                    const img = new Image();
                    const url = URL.createObjectURL(imgBlob);
                    
                    await new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = reject;
                        img.src = url;
                    });
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const convertedBlob = await new Promise(resolve => {
                        canvas.toBlob(resolve, `image/${format}`, quality);
                    });
                    
                    const newFileName = file.name.replace(/\.[^/.]+$/, `.${format}`);
                    convertedFiles.push({ blob: convertedBlob, name: newFileName });
                    
                    URL.revokeObjectURL(url);
                } catch (error) {
                    console.error(`转换失败: ${file.name}`, error);
                    alert(`转换失败: ${file.name}\n${error.message}`);
                }
            }
            
            progressBar.style.width = '100%';
            progressText.textContent = '✅ 转换完成！';
            convertBtn.disabled = false;
            downloadAllBtn.disabled = false;
            
            // 显示转换结果
            showConvertedResults();
        });

        // 显示转换结果
        function showConvertedResults() {
            fileList.innerHTML = '';
            
            convertedFiles.forEach((file, index) => {
                const fileSize = (file.blob.size / 1024 / 1024).toFixed(2);
                const fileItem = document.createElement('div');
                fileItem.className = 'glass rounded-2xl p-6 shadow-lg flex items-center justify-between transition-all duration-300 hover:shadow-xl';
                fileItem.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-16 h-16 rounded-xl bg-green-100 dark:bg-green-900/30 flex items-center justify-center">
                            <span class="text-3xl">✅</span>
                        </div>
                        <div>
                            <h4 class="font-semibold text-lg text-gray-800 dark:text-white">${file.name}</h4>
                            <p class="text-gray-500 dark:text-gray-400">${fileSize} MB</p>
                        </div>
                    </div>
                    <a href="${URL.createObjectURL(file.blob)}" download="${file.name}" 
                       class="px-6 py-3 bg-gradient-to-r from-primary to-secondary text-white rounded-xl font-medium shadow-lg hover:shadow-xl hover:scale-105 transition-all">
                        下载
                    </a>
                `;
                fileList.appendChild(fileItem);
            });
        }

        // 下载全部为ZIP
        downloadAllBtn.addEventListener('click', async () => {
            if (convertedFiles.length === 0) return;
            
            progressPanel.style.display = 'block';
            progressBar.style.width = '0%';
            progressText.textContent = '正在打包ZIP文件...';
            
            const zip = new JSZip();
            
            convertedFiles.forEach((file, index) => {
                zip.file(file.name, file.blob);
                progressBar.style.width = `${((index + 1) / convertedFiles.length) * 50}%`;
            });
            
            progressText.textContent = '正在生成ZIP文件...';
            const zipBlob = await zip.generateAsync({ type: 'blob' }, (metadata) => {
                progressBar.style.width = `${50 + metadata.percent / 2}%`;
            });
            
            progressBar.style.width = '100%';
            progressText.textContent = '下载开始！';
            
            const a = document.createElement('a');
            a.href = URL.createObjectURL(zipBlob);
            a.download = `转换后的图片_${new Date().toLocaleDateString().replace(/\//g, '-')}.zip`;
            a.click();
            URL.revokeObjectURL(a.href);
            
            setTimeout(() => {
                progressPanel.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => {
                    progressPanel.style.display = 'none';
                }, 500);
            }, 1500);
        });
    </script>
</body>
</html>
